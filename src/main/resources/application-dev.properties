# ============================================================
# DEV Profile — H2 In-Memory Database (no MySQL needed)
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ============================================================

# ---- H2 Datasource ----
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ---- H2 Console (http://localhost:8080/h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Disable mail in dev (prevent startup errors) ----
spring.mail.host=localhost
spring.mail.port=1025
