# ============================================================
# Quiz Tournament Backend — Application Properties
# ============================================================
# Default profile uses MySQL. For zero-setup dev, run with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ============================================================

# ---- Server ----
server.port=8080

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_tournament_db
spring.datasource.username=root
spring.datasource.password=Pass@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---- Mail (configure with your SMTP provider) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Jackson (date format) ----
spring.jackson.serialization.write-dates-as-timestamps=false
